spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.naver.com
    port: 465
    username: test_email@example.com
    password: test_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            enable: true
          debug: true

async:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 25
  thread-name-prefix: Email-

email:
  cookie:
    name: "client-id"
    expiration: 86400
  auth:
    redis-expiration: 86400
    max-send-count: 5
    max-attempt-count: 5
  auth-number:
    redis-expiration: 300

jwt:
  secret-key:
    temporary: thisistemporarysecretkeyoftosiltosil
    access: thisistosiltosilspringsecuritytestiamveryhappyyeahyeah
    refresh: thisistosiltosilspringsecuritytestohmygodyeahyeah
  expiration:
    temporary: 600000 # 10분 (1000L(ms -> s) * 60L(s -> m) * 10L)
    access: 3600000 # 1시간(60분) (1000L(ms -> s) * 60L(s -> m) * 60L(m -> h))
    refresh: 1209600033 # 2주
  header: Authorization
  cookie:
    secure: false
    same-site: NONE
    name:
      access: access-token
      refresh: refresh-token
      temporary: temporary-token

springdoc:
  server:
    url: http://localhost:8080